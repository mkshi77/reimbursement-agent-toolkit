<svg xmlns="http://www.w3.org/2000/svg" width="980" height="220" viewBox="0 0 980 220" role="img" aria-label="Reimbursement workflow">
  <defs>
    <style>
      .box{fill:#f8fafc;stroke:#2563eb;stroke-width:2;rx:10}
      .title{font-family:Arial,sans-serif;font-size:16px;font-weight:700;fill:#0f172a}
      .sub{font-family:Arial,sans-serif;font-size:12px;fill:#475569}
      .arrow{stroke:#64748b;stroke-width:2;marker-end:url(#m)}
    </style>
    <marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect x="20" y="60" width="130" height="82" class="box"/>
  <text x="85" y="92" text-anchor="middle" class="title">Materials</text>
  <text x="85" y="116" text-anchor="middle" class="sub">Invoices, screenshots</text>
  <line x1="150" y1="101" x2="185" y2="101" class="arrow"/>
  <rect x="190" y="60" width="130" height="82" class="box"/>
  <text x="255" y="92" text-anchor="middle" class="title">Extract</text>
  <text x="255" y="116" text-anchor="middle" class="sub">OCR or agent vision</text>
  <line x1="320" y1="101" x2="355" y2="101" class="arrow"/>
  <rect x="360" y="60" width="130" height="82" class="box"/>
  <text x="425" y="92" text-anchor="middle" class="title">Classify</text>
  <text x="425" y="116" text-anchor="middle" class="sub">Category, confidence</text>
  <line x1="490" y1="101" x2="525" y2="101" class="arrow"/>
  <rect x="530" y="60" width="130" height="82" class="box"/>
  <text x="595" y="92" text-anchor="middle" class="title">Confirm</text>
  <text x="595" y="116" text-anchor="middle" class="sub">Every line item</text>
  <line x1="660" y1="101" x2="695" y2="101" class="arrow"/>
  <rect x="700" y="60" width="130" height="82" class="box"/>
  <text x="765" y="92" text-anchor="middle" class="title">Validate</text>
  <text x="765" y="116" text-anchor="middle" class="sub">Tax, totals, rules</text>
  <line x1="830" y1="101" x2="865" y2="101" class="arrow"/>
  <rect x="870" y="60" width="90" height="82" class="box"/>
  <text x="915" y="92" text-anchor="middle" class="title">Package</text>
  <text x="915" y="116" text-anchor="middle" class="sub">Forms + files</text>
</svg>

