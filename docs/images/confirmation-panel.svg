<svg xmlns="http://www.w3.org/2000/svg" width="980" height="320" viewBox="0 0 980 320" role="img" aria-label="逐笔费用确认面板">
  <defs>
    <style>
      .bg{fill:#ffffff;stroke:#cbd5e1;stroke-width:1.5;rx:10}
      .head{fill:#eff6ff}
      .text{font-family:'Microsoft YaHei','PingFang SC',Arial,sans-serif;font-size:13px;fill:#0f172a}
      .muted{font-family:'Microsoft YaHei','PingFang SC',Arial,sans-serif;font-size:12px;fill:#64748b}
      .ok{fill:#dcfce7}
      .review{fill:#fef9c3}
      .exclude{fill:#fee2e2}
      .line{stroke:#e2e8f0}
    </style>
  </defs>
  <rect x="20" y="30" width="940" height="260" class="bg"/>
  <rect x="20" y="30" width="940" height="42" class="head"/>
  <text x="40" y="56" class="text" font-weight="700">逐笔费用确认表</text>

  <text x="40" y="95" class="muted">处理</text>
  <text x="115" y="95" class="muted">日期</text>
  <text x="220" y="95" class="muted">商户 / 路线</text>
  <text x="470" y="95" class="muted">金额</text>
  <text x="570" y="95" class="muted">费用类别</text>
  <text x="710" y="95" class="muted">置信度</text>
  <text x="820" y="95" class="muted">来源文件</text>
  <line x1="20" y1="108" x2="960" y2="108" class="line"/>

  <rect x="36" y="124" width="44" height="24" class="ok"/>
  <text x="48" y="141" class="text">纳入</text>
  <text x="115" y="141" class="text">2026-06-10</text>
  <text x="220" y="141" class="text">滴滴到高铁站</text>
  <text x="470" y="141" class="text">38.50</text>
  <text x="570" y="141" class="text">市内交通</text>
  <text x="710" y="141" class="text">0.88</text>
  <text x="820" y="141" class="text">微信截图_01.png</text>
  <line x1="20" y1="158" x2="960" y2="158" class="line"/>

  <rect x="36" y="174" width="56" height="24" class="review"/>
  <text x="48" y="191" class="text">待确认</text>
  <text x="115" y="191" class="text">2026-06-11</text>
  <text x="220" y="191" class="text">杭州示例酒店</text>
  <text x="470" y="191" class="text">420.00</text>
  <text x="570" y="191" class="text">住宿费</text>
  <text x="710" y="191" class="text">0.94</text>
  <text x="820" y="191" class="text">酒店发票.pdf</text>
  <text x="115" y="215" class="muted">提示：发票购买方名称与公司配置不一致，需要用户确认。</text>
  <line x1="20" y1="228" x2="960" y2="228" class="line"/>

  <rect x="36" y="244" width="44" height="24" class="exclude"/>
  <text x="48" y="261" class="text">排除</text>
  <text x="115" y="261" class="text">2026-06-11</text>
  <text x="220" y="261" class="text">微信转账给朋友</text>
  <text x="470" y="261" class="text">200.00</text>
  <text x="570" y="261" class="text">非报销项</text>
  <text x="710" y="261" class="text">0.80</text>
  <text x="820" y="261" class="text">微信截图_02.png</text>
</svg>

